backend:
  name: github
  repo: proball-cms/proball
  branch: master
  base_url: https://proball.vercel.app
  auth_endpoint: api/auth

media_folder: images
public_folder: ""

collections:
  - name: posts
    label: Blog Posts
    folder: blog/posts
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, date_format: YYYY-MM-DD, time_format: false, format: YYYY-MM-DD }
      - { label: Author, name: author, widget: string }
      - { label: Author Title, name: authorTitle, widget: string, default: ProBall Basketball }
      - label: Category
        name: category
        widget: select
        options:
          - Coaching
          - Development
          - Mindset
          - News
          - Parenting & Sport
          - Performance
          - Training
      - { label: Description, name: description, widget: string, hint: "Short summary shown on blog cards and in search results (1–2 sentences)" }
      - { label: Cover Image, name: image, widget: image, hint: "Upload the cover image. Only the filename will be stored." }
      - { label: Image Alt Text, name: imageAlt, widget: string }
      - { label: Image Position, name: imagePosition, widget: string, default: "center center", hint: "CSS object-position value, e.g. 'center 30%'" }
      - { label: CTA Heading, name: ctaHeading, widget: string }
      - { label: CTA Body, name: ctaBody, widget: string }
      - { label: Body, name: body, widget: markdown }
